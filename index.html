<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XANA AI製品 無料相談会 予約</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
body {
  background: #f5f5f7;
  font-family: 'Inter','Noto Sans JP',sans-serif;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px 80px;
}
.card {
  width: 100%; max-width: 440px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  overflow: hidden;
  animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Black Banner */
.banner {
  background: #1a1a1a;
  padding: 28px 28px 26px;
}
.banner-tag {
  font-size: 10px; font-weight: 600; letter-spacing: .16em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
  margin-bottom: 14px;
}
.banner h1 {
  font-size: 24px; font-weight: 600; letter-spacing: -.02em;
  line-height: 1.3; color: #fff; margin-bottom: 8px;
}
.banner p { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.7; font-weight: 300; }

/* Body */
.body { padding: 24px 24px 28px; }

/* Steps */
.steps {
  display: flex; align-items: center; margin-bottom: 28px;
  padding: 12px 14px;
  background: #f5f5f7; border-radius: 10px;
}
.step { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#bbb; flex:1; }
.step.active { color: #1a1a1a; }
.step.done   { color: #888; }
.step-num {
  width:22px; height:22px; border-radius:50%;
  background: #e8e8e8; color: #bbb;
  font-size:11px; font-weight:600;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.step.active .step-num { background: #1a1a1a; color: #fff; }
.step.done   .step-num { background: #888; color: #fff; }
.step-line { flex:1; height:1px; background:#e8e8e8; margin:0 6px; }

.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  color: #888; text-transform: uppercase; margin-bottom: 14px;
}

/* Calendar */
#step2,#step3,#stepDone,#stepLoading { display:none; }

.month-nav {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
}
.month-nav button {
  background: #f5f5f7; border: none; cursor:pointer;
  width:32px; height:32px; border-radius:50%; font-size:16px; color:#555;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.month-nav button:hover { background:#e8e8e8; color:#1a1a1a; }
.month-label { font-size:15px; font-weight:600; letter-spacing:-.01em; }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:22px; }
.cal-dow { text-align:center; font-size:10px; font-weight:600; color:#bbb; padding:4px 0 10px; }
.cal-day {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-size:13px; font-weight:400; cursor:pointer; color:#555;
  transition:all .15s;
}
.cal-day:hover:not(.disabled):not(.empty) { background:#f0f0f0; color:#1a1a1a; }
.cal-day.empty   { cursor:default; }
.cal-day.disabled{ color:#ddd; cursor:default; pointer-events:none; }
.cal-day.today   { color:#1a1a1a; font-weight:700; }
.cal-day.selected{ background:#1a1a1a !important; color:#fff !important; font-weight:600; }
.cal-day.sun:not(.disabled) { color:#ff6961; }
.cal-day.sun.selected { color:#fff !important; }

/* Time */
.date-chip {
  font-size:13px; color:#555; margin-bottom:18px;
  padding:10px 14px; background:#f5f5f7; border-radius:8px;
}
.time-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:22px; }
.time-slot {
  padding:14px 6px; border:1.5px solid #e8e8e8; border-radius:10px;
  text-align:center; font-size:14px; font-weight:400; color:#333;
  cursor:pointer; transition:all .15s; background:#fff;
  font-family:'Inter','Noto Sans JP',sans-serif;
}
.time-slot:hover  { border-color:#1a1a1a; color:#1a1a1a; }
.time-slot.selected { border-color:#1a1a1a; background:#1a1a1a; color:#fff; font-weight:500; }
.time-slot.full {
  border-color:#f0f0f0; color:#ccc; cursor:not-allowed;
  background:#fafafa; font-size:11px; pointer-events:none;
}

/* Form */
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; font-weight:600; color:#888; margin-bottom:7px; letter-spacing:.06em; text-transform:uppercase; }
.field input {
  width:100%; padding:13px 14px;
  border:1.5px solid #e8e8e8; border-radius:10px;
  background:#fff; font-size:14px;
  font-family:'Inter','Noto Sans JP',sans-serif; color:#1a1a1a;
  outline:none; transition:border-color .2s;
}
.field input::placeholder { color: #ccc; }
.field input:focus { border-color:#1a1a1a; }
.field input.error { border-color:#ff4444; }

.confirm-box {
  background:#f5f5f7; border-radius:10px; padding:16px 18px;
  margin-bottom:20px; font-size:14px; line-height:2.2; color:#333;
}
.confirm-box strong { color:#1a1a1a; font-weight:600; }

.divider { height:1px; background:#f0f0f0; margin:20px 0; }

/* Buttons */
.btn-row { display:flex; gap:8px; margin-top:8px; }
.btn-back {
  flex:1; padding:14px; border:1.5px solid #e8e8e8; border-radius:10px;
  background:#fff; font-size:14px; font-weight:500; color:#888;
  cursor:pointer; font-family:'Inter','Noto Sans JP',sans-serif; transition:all .2s;
}
.btn-back:hover { border-color:#ccc; color:#333; }
.btn-next {
  flex:2; padding:14px; border:none; border-radius:10px;
  background:#1a1a1a; font-size:14px; font-weight:600; color:#fff;
  cursor:pointer; font-family:'Inter','Noto Sans JP',sans-serif; transition:all .2s;
}
.btn-next:hover:not(:disabled) { background:#333; transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.15); }
.btn-next:disabled { background:#e8e8e8; color:#bbb; cursor:not-allowed; }

/* Loading */
#stepLoading { text-align:center; padding:48px 0; }
.spinner {
  width:36px; height:36px; border:2px solid #e8e8e8; border-top-color:#1a1a1a;
  border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 18px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#stepLoading p { font-size:13px; color:#888; font-weight:300; }

/* Done */
#stepDone { text-align:center; padding:8px 0; }
.done-icon {
  width:60px; height:60px; background:#1a1a1a;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:22px; color:#fff; margin:0 auto 22px;
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
#stepDone h2 { font-size:22px; font-weight:600; margin-bottom:10px; letter-spacing:-.02em; }
#stepDone > p { font-size:13px; color:#888; line-height:1.8; margin-bottom:22px; font-weight:300; }
.done-detail {
  background:#f5f5f7; border-radius:12px; padding:18px 20px;
  font-size:13px; text-align:left; line-height:2.6; color:#555;
}
.done-detail b { color:#1a1a1a; font-weight:500; }
.done-detail a { color:#1a1a1a; }

.error-msg { font-size:11px; color:#ff4444; margin-top:6px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="banner">
    <div class="banner-tag">完全無料</div>
    <h1>XANA AI製品 無料相談会</h1>
    <p>30分 · オンライン（Google Meet）<br>担当者は自動でご案内します</p>
  </div>

  <div class="body">
    <div class="steps" id="stepsBar">
      <div class="step active" id="si1"><div class="step-num">1</div> 日付</div>
      <div class="step-line"></div>
      <div class="step" id="si2"><div class="step-num">2</div> 時間</div>
      <div class="step-line"></div>
      <div class="step" id="si3"><div class="step-num">3</div> 確認</div>
    </div>

    <!-- STEP 1 -->
    <div id="step1">
      <div class="section-label">日付を選択</div>
      <div class="month-nav">
        <button onclick="prevMonth()">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <button class="btn-next" id="btn1" onclick="goStep2()" disabled style="width:100%;">次へ</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2">
      <div class="date-chip" id="dateChip"></div>
      <div class="section-label">時間を選択</div>
      <div class="time-grid" id="timeGrid"></div>
      <div class="btn-row">
        <button class="btn-back" onclick="goStep1()">戻る</button>
        <button class="btn-next" id="btn2" onclick="goStep3()" disabled>次へ</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="step3">
      <div class="section-label">予約内容</div>
      <div class="confirm-box" id="confirmBox"></div>
      <div class="divider"></div>
      <div class="section-label">お客様情報</div>
      <div class="field">
        <label>お名前</label>
        <input type="text" id="nameInput" placeholder="山田 太郎" oninput="validateForm()">
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="emailInput" placeholder="yamada@example.com" oninput="validateForm()">
        <div class="error-msg" id="emailError">正しいメールアドレスを入力してください</div>
      </div>
      <div class="field">
        <label>電話番号 <span style="color:#ccc;font-weight:400;text-transform:none;letter-spacing:0">（任意）</span></label>
        <input type="tel" id="telInput" placeholder="090-1234-5678">
      </div>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn-back" onclick="goStep2b()">戻る</button>
        <button class="btn-next" id="btn3" onclick="submitBooking()" disabled>予約を確定する</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="stepLoading">
      <div class="spinner"></div>
      <p>Google Meetリンクを作成中です</p>
    </div>

    <!-- Done -->
    <div id="stepDone">
      <div class="done-icon">✓</div>
      <h2>予約が完了しました</h2>
      <p>Google Meetリンクをメールにて<br>お送りしました。ご確認ください。</p>
      <div class="done-detail" id="doneDetail"></div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw3Y905Jnp-2RtZLz4mCNSiB4C60irVcsqPHaHVbOejxJK4qIQA5zdkOkGWp-9_qzH0TQ/exec';
const TIMES = ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30'];
const WD = ['日','月','火','水','木','金','土'];
const today = new Date();
let curY = today.getFullYear(), curM = today.getMonth();
let selDate = null, selTime = null;

function renderCal() {
  document.getElementById('monthLabel').textContent = curY + '年 ' + (curM+1) + '月';
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  WD.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; g.appendChild(el);
  });
  const firstDow = new Date(curY, curM, 1).getDay();
  const days = new Date(curY, curM+1, 0).getDate();
  const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  for(let i=0;i<firstDow;i++){const e=document.createElement('div');e.className='cal-day empty';g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const el = document.createElement('div');
    const dt = new Date(curY, curM, d);
    const dow = dt.getDay();
    let cls = 'cal-day';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    const isPast = dt < todayMid;
    if(isPast || dow===0 || isHoliday(dt)){ cls+=' disabled'; }
    else {
      if(dt.toDateString()===today.toDateString()) cls+=' today';
      if(selDate && dt.toDateString()===selDate.toDateString()) cls+=' selected';
      el.onclick = () => pickDate(new Date(curY,curM,d));
    }
    el.className = cls; el.textContent = d; g.appendChild(el);
  }
}
function pickDate(dt){ selDate=dt; selTime=null; document.getElementById('btn1').disabled=false; renderCal(); }
function prevMonth(){ curM--; if(curM<0){curM=11;curY--;} renderCal(); }
function nextMonth(){ curM++; if(curM>11){curM=0;curY++;} renderCal(); }

const HOLIDAYS = new Set([
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23','2026-12-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
]);
function isHoliday(dt){
  const s = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  return HOLIDAYS.has(s);
}
function fmtDate(dt){ return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日（'+WD[dt.getDay()]+'）'; }
function addMin(t,m){ const [h,n]=t.split(':').map(Number),tot=h*60+n+m; return String(~~(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0'); }
function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

async function goStep2(){
  if(!selDate) return;
  document.getElementById('dateChip').textContent = '📅  ' + fmtDate(selDate);
  selTime = null;
  document.getElementById('btn2').disabled = true;
  const g = document.getElementById('timeGrid');
  g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px 0;color:#bbb;font-size:13px;">空き状況を確認中…</div>';
  show('step2'); setStep(2);
  let fullSlots = new Set();
  try {
    const checks = TIMES.map(t => ({ time:t, startISO:toISO(selDate,t), endISO:toISO(selDate,addMin(t,30)) }));
    const res = await fetch(GAS_URL, { method:'POST', body:JSON.stringify({ action:'checkAvailability', slots:checks }) });
    const json = await res.json();
    if(json.fullSlots) fullSlots = new Set(json.fullSlots);
  } catch(e) { console.warn(e); }
  g.innerHTML = '';
  TIMES.forEach(t => {
    const full = fullSlots.has(t);
    const el = document.createElement('div');
    el.className = 'time-slot' + (full ? ' full' : '');
    if(full){
      el.innerHTML = '<span style="display:block;font-size:13px;">'+t+'</span><span style="font-size:10px;letter-spacing:.04em;">満席</span>';
    } else {
      el.textContent = t;
      el.onclick = () => pickTime(t, el);
    }
    g.appendChild(el);
  });
}
function pickTime(t,el){
  selTime=t;
  document.querySelectorAll('.time-slot').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn2').disabled = false;
}
function goStep3(){
  if(!selTime) return;
  document.getElementById('confirmBox').innerHTML =
    '<strong>'+fmtDate(selDate)+'</strong><br>'+selTime+' – '+addMin(selTime,30)+'　30分間';
  show('step3'); setStep(3);
}
function validateForm(){
  const name=document.getElementById('nameInput').value.trim();
  const email=document.getElementById('emailInput').value.trim();
  const emailErr=document.getElementById('emailError');
  const emailEl=document.getElementById('emailInput');
  if(email && !isValidEmail(email)){emailErr.style.display='block';emailEl.classList.add('error');}
  else{emailErr.style.display='none';emailEl.classList.remove('error');}
  document.getElementById('btn3').disabled=!(name && email && isValidEmail(email));
}
async function submitBooking(){
  const name=document.getElementById('nameInput').value.trim();
  const email=document.getElementById('emailInput').value.trim();
  const tel=document.getElementById('telInput').value.trim();
  const payload={name,email,tel,date:fmtDate(selDate),time:selTime,endTime:addMin(selTime,30),startISO:toISO(selDate,selTime),endISO:toISO(selDate,addMin(selTime,30))};
  document.getElementById('stepsBar').style.display='none';
  show('stepLoading');
  try {
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)});
    const json=await res.json();
    if(!json.success && json.error==='FULLY_BOOKED'){
      document.getElementById('stepsBar').style.display='flex';
      show('step2'); setStep(2);
      const msg=document.createElement('div');
      msg.style.cssText='background:#fff0f0;border:1px solid #ffcccc;border-radius:10px;padding:12px 16px;font-size:13px;color:#cc0000;margin-bottom:16px;';
      msg.textContent='この時間帯は満席です。別の時間をお選びください。';
      const grid=document.getElementById('timeGrid');
      grid.parentNode.insertBefore(msg,grid);
      setTimeout(()=>msg.remove(),8000);
      return;
    }
    document.getElementById('doneDetail').innerHTML=
      '📅 <b>'+payload.date+' '+payload.time+' – '+payload.endTime+'</b><br>'+
      '👤 <b>'+name+'</b><br>'+
      '📧 <b>'+email+'</b><br>'+
      '🔗 Google Meet: <b><a href="'+(json.meetUrl||'#')+'">'+(json.meetUrl?'リンクを開く':'メールで送付済み')+'</a></b>';
    show('stepDone');
  } catch(err){
    document.getElementById('doneDetail').innerHTML='📅 <b>'+payload.date+' '+payload.time+' – '+payload.endTime+'</b><br>👤 <b>'+name+'</b><br>📧 <b>'+email+'</b>';
    show('stepDone');
  }
}
function toISO(date,timeStr){
  const [h,m]=timeStr.split(':').map(Number);
  return new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m,0).toISOString();
}
function goStep1(){ show('step1'); setStep(1); }
function goStep2b(){ show('step2'); setStep(2); }
function show(id){ ['step1','step2','step3','stepLoading','stepDone'].forEach(s=>document.getElementById(s).style.display=s===id?'block':'none'); }
function setStep(n){ [1,2,3].forEach(i=>{const e=document.getElementById('si'+i);e.className='step'+(i===n?' active':i<n?' done':'');}); }
renderCal();
</script>
</body>
</html>
