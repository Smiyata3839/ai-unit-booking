<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI UNIT 無料相談会 予約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f7f8fa; font-family: 'Noto Sans JP', sans-serif;
  color: #1a1a1a; min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 32px 16px 60px;
}
.card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  width: 100%; max-width: 480px; overflow: hidden;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.banner {
  background: linear-gradient(135deg, #0066ff 0%, #00c6a0 100%);
  padding: 28px 32px 24px; color: #fff;
}
.banner-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  background: rgba(255,255,255,.2); display: inline-block;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.banner h1 { font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
.banner p  { font-size: 13px; opacity: .85; line-height: 1.6; }

.body { padding: 28px 28px 32px; }

/* Steps */
.steps { display: flex; align-items: center; margin-bottom: 28px; }
.step { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#bbb; flex:1; }
.step.active { color: #0066ff; }
.step.done   { color: #00c6a0; }
.step-num {
  width:24px; height:24px; border-radius:50%; background:#eee; color:#bbb;
  font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.step.active .step-num { background:#0066ff; color:#fff; }
.step.done   .step-num { background:#00c6a0; color:#fff; }
.step-line { flex:1; height:1px; background:#eee; margin:0 6px; }

.section-label {
  font-size:13px; font-weight:700; color:#444; margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.section-label::before { content:''; width:3px; height:14px; background:#0066ff; border-radius:2px; display:inline-block; }

/* Calendar */
#step2,#step3,#stepDone,#stepLoading { display:none; }

.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.month-nav button {
  background:none; border:none; cursor:pointer; width:32px; height:32px;
  border-radius:50%; font-size:16px; color:#555;
  display:flex; align-items:center; justify-content:center; transition:background .2s;
}
.month-nav button:hover { background:#f0f4ff; }
.month-label { font-size:15px; font-weight:700; }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dow { text-align:center; font-size:11px; font-weight:700; color:#aaa; padding:4px 0 8px; }
.cal-day {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; color:#333;
  transition:all .15s; border:2px solid transparent;
}
.cal-day:hover:not(.disabled):not(.empty) { background:#f0f4ff; border-color:#c0d4ff; }
.cal-day.empty   { cursor:default; }
.cal-day.disabled{ color:#ddd; cursor:default; pointer-events:none; }
.cal-day.today   { color:#0066ff; font-weight:700; }
.cal-day.selected{ background:#0066ff !important; color:#fff !important; border-color:#0066ff !important; }
.cal-day.sun     { color:#ff5555; }
.cal-day.sun.selected { color:#fff; }
.cal-day.sat     { color:#4488ff; }
.cal-day.sat.selected { color:#fff; }

/* Time */
.date-chip { font-size:13px; color:#555; margin-bottom:16px; padding:10px 14px; background:#f7f8fa; border-radius:8px; }
.time-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.time-slot {
  padding:14px 6px; border:2px solid #e8e8e8; border-radius:10px;
  text-align:center; font-size:15px; font-weight:500; color:#333;
  cursor:pointer; transition:all .15s; background:#fff;
  font-family:'Noto Sans JP',sans-serif;
}
.time-slot:hover  { border-color:#0066ff; color:#0066ff; background:#f0f4ff; }
.time-slot.selected { border-color:#0066ff; background:#0066ff; color:#fff; }
.time-slot.full { border-color:#eee; color:#ccc; cursor:not-allowed; background:#fafafa; font-size:12px; pointer-events:none; }

/* Form fields */
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:700; color:#555; margin-bottom:6px; }
.field input {
  width:100%; padding:13px 14px; border:2px solid #e8e8e8; border-radius:10px;
  font-size:14px; font-family:'Noto Sans JP',sans-serif; color:#1a1a1a;
  outline:none; transition:border-color .2s;
}
.field input:focus { border-color:#0066ff; }
.field input.error { border-color:#ff4444; }

.confirm-box {
  background:#f0f4ff; border-radius:10px; padding:16px;
  margin-bottom:18px; font-size:13px; line-height:2.2; color:#333;
}
.confirm-box strong { color:#0066ff; }

/* Buttons */
.btn-row { display:flex; gap:10px; margin-top:20px; }
.btn-back {
  flex:1; padding:14px; border:2px solid #e8e8e8; border-radius:10px;
  background:#fff; font-size:14px; font-weight:700; color:#888;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all .2s;
}
.btn-back:hover { border-color:#ccc; color:#555; }
.btn-next {
  flex:2; padding:14px; border:none; border-radius:10px;
  background:#0066ff; font-size:14px; font-weight:700; color:#fff;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all .2s;
}
.btn-next:hover:not(:disabled) { background:#0052cc; transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,102,255,.3); }
.btn-next:disabled { background:#c8d8ff; cursor:not-allowed; }

/* Loading */
#stepLoading { text-align:center; padding:40px 0; }
.spinner {
  width:40px; height:40px; border:3px solid #e8e8e8; border-top-color:#0066ff;
  border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#stepLoading p { font-size:13px; color:#888; }

/* Done */
#stepDone { text-align:center; padding:8px 0; }
.done-icon {
  width:64px; height:64px;
  background:linear-gradient(135deg,#00c6a0,#0066ff);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:28px; margin:0 auto 20px;
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
#stepDone h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
#stepDone p  { font-size:13px; color:#666; line-height:1.8; margin-bottom:20px; }
.done-detail {
  background:#f7f8fa; border-radius:10px; padding:16px;
  font-size:13px; text-align:left; line-height:2.4; color:#444;
}
.done-detail b { color:#1a1a1a; }

.error-msg { font-size:11px; color:#ff4444; margin-top:4px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="banner">
    <div class="banner-tag">✨ 完全無料</div>
    <h1>AI UNIT 無料相談会</h1>
    <p>30分 ・ オンライン（Google Meet）・ 担当者は自動でご案内</p>
  </div>

  <div class="body">
    <div class="steps" id="stepsBar">
      <div class="step active" id="si1"><div class="step-num">1</div> 日付</div>
      <div class="step-line"></div>
      <div class="step" id="si2"><div class="step-num">2</div> 時間</div>
      <div class="step-line"></div>
      <div class="step" id="si3"><div class="step-num">3</div> 確認</div>
    </div>

    <!-- STEP 1: Calendar -->
    <div id="step1">
      <div class="section-label">日付を選んでください</div>
      <div class="month-nav">
        <button onclick="prevMonth()">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="btn-row">
        <button class="btn-next" id="btn1" onclick="goStep2()" disabled>次へ　→</button>
      </div>
    </div>

    <!-- STEP 2: Time -->
    <div id="step2">
      <div class="date-chip" id="dateChip">📅 </div>
      <div class="section-label">時間を選んでください</div>
      <div class="time-grid" id="timeGrid"></div>
      <div class="btn-row">
        <button class="btn-back" onclick="goStep1()">← 戻る</button>
        <button class="btn-next" id="btn2" onclick="goStep3()" disabled>次へ　→</button>
      </div>
    </div>

    <!-- STEP 3: Info -->
    <div id="step3">
      <div class="section-label">お客様情報を入力してください</div>
      <div class="confirm-box" id="confirmBox"></div>

      <div class="field">
        <label>お名前 *</label>
        <input type="text" id="nameInput" placeholder="例）山田 太郎" oninput="validateForm()">
      </div>
      <div class="field">
        <label>メールアドレス *</label>
        <input type="email" id="emailInput" placeholder="例）yamada@example.com" oninput="validateForm()">
        <div class="error-msg" id="emailError">正しいメールアドレスを入力してください</div>
      </div>
      <div class="field">
        <label>電話番号（任意）</label>
        <input type="tel" id="telInput" placeholder="例）090-1234-5678">
      </div>

      <div class="btn-row">
        <button class="btn-back" onclick="goStep2b()">← 戻る</button>
        <button class="btn-next" id="btn3" onclick="submitBooking()" disabled>予約を確定する</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="stepLoading">
      <div class="spinner"></div>
      <p>Google Meetリンクを作成中です…</p>
    </div>

    <!-- Done -->
    <div id="stepDone">
      <div class="done-icon">✓</div>
      <h2>予約が完了しました！</h2>
      <p>Google Meetリンクをメールにてお送りしました。<br>ご確認をお願いします。</p>
      <div class="done-detail" id="doneDetail"></div>
    </div>
  </div>
</div>

<script>
// =============================================
// CONFIG — Google Apps Script URLをここに設定
// =============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw6eB3Qe60fvzaRGbhmtmhiL-8k75cXQ-iDKfkpUubzX-_4YqNj7ySj_hQY8XWjRqvDJw/exec'; // ← デプロイ後のURLに変更

// ホストの優先順位アサインはGAS側で自動管理
// 優先1: smiyata3839 / 優先2: takuya050120 / 優先3: t.yaguchi03

const TIMES = ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30'];
const WD = ['日','月','火','水','木','金','土'];
const today = new Date();
let curY = today.getFullYear(), curM = today.getMonth();
let selDate = null, selTime = null;

// ---- Calendar ----
function renderCal() {
  document.getElementById('monthLabel').textContent = `${curY}年 ${curM+1}月`;
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    if(i===0) el.style.color='#ff9999';
    if(i===6) el.style.color='#99bbff';
    g.appendChild(el);
  });
  const firstDow = new Date(curY, curM, 1).getDay();
  const days = new Date(curY, curM+1, 0).getDate();
  const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  for(let i=0;i<firstDow;i++){const e=document.createElement('div');e.className='cal-day empty';g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const el = document.createElement('div');
    const dt = new Date(curY, curM, d);
    const dow = dt.getDay();
    let cls = 'cal-day';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    const isPast = dt < todayMid;
    if(isPast || dow===0){ cls+=' disabled'; }
    else {
      if(dt.toDateString()===today.toDateString()) cls+=' today';
      if(selDate && dt.toDateString()===selDate.toDateString()) cls+=' selected';
      el.onclick = () => pickDate(new Date(curY,curM,d));
    }
    el.className = cls;
    el.textContent = d;
    g.appendChild(el);
  }
}
function pickDate(dt){ selDate=dt; selTime=null; document.getElementById('btn1').disabled=false; renderCal(); }
function prevMonth(){ curM--; if(curM<0){curM=11;curY--;} renderCal(); }
function nextMonth(){ curM++; if(curM>11){curM=0;curY++;} renderCal(); }

// ---- Helpers ----
function fmtDate(dt){ return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${WD[dt.getDay()]}）`; }
function addMin(t,m){ const [h,n]=t.split(':').map(Number),tot=h*60+n+m; return `${String(~~(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; }
function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

// ---- Step 2 ----
async function goStep2(){
  if(!selDate) return;
  document.getElementById('dateChip').innerHTML = '📅 ' + fmtDate(selDate);
  selTime = null;
  document.getElementById('btn2').disabled = true;

  const g = document.getElementById('timeGrid');
  g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px 0;color:#aaa;font-size:13px;">空き状況を確認中…</div>';
  show('step2'); setStep(2);

  let fullSlots = new Set();
  try {
    const checks = TIMES.map(t => ({
      time: t,
      startISO: toISO(selDate, t),
      endISO:   toISO(selDate, addMin(t, 30))
    }));
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'checkAvailability', slots: checks })
    });
    const json = await res.json();
    if (json.fullSlots) fullSlots = new Set(json.fullSlots);
  } catch(e) {
    console.warn('空き確認未接続:', e.message);
  }

  g.innerHTML = '';
  TIMES.forEach(t => {
    const full = fullSlots.has(t);
    const el = document.createElement('div');
    el.className = 'time-slot' + (full ? ' full' : '');
    if (full) {
      el.innerHTML = '<span style="display:block;font-size:14px;color:#ccc">' + t + '</span>'
                   + '<span style="font-size:10px;color:#ccc">満席</span>';
    } else {
      el.textContent = t;
      el.onclick = () => pickTime(t, el);
    }
    g.appendChild(el);
  });
}
function pickTime(t,el){
  selTime=t;
  document.querySelectorAll('.time-slot').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn2').disabled = false;
}

// ---- Step 3 ----
function goStep3(){
  if(!selTime) return;
  document.getElementById('confirmBox').innerHTML =
    `🗓 <strong>${fmtDate(selDate)}</strong><br>`+
    `⏰ <strong>${selTime} 〜 ${addMin(selTime,30)}</strong>（30分）<br>`+
    `💻 Google Meetリンクはメールにてお送りします`;
  show('step3'); setStep(3);
}

function validateForm(){
  const name  = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const emailErr = document.getElementById('emailError');
  const emailEl  = document.getElementById('emailInput');
  if(email && !isValidEmail(email)){
    emailErr.style.display='block'; emailEl.classList.add('error');
  } else {
    emailErr.style.display='none'; emailEl.classList.remove('error');
  }
  document.getElementById('btn3').disabled = !(name && email && isValidEmail(email));
}

// ---- Submit → GAS ----
async function submitBooking(){
  const name  = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const tel   = document.getElementById('telInput').value.trim();

  const payload = {
    name,
    email,
    tel,
    date:     fmtDate(selDate),
    time:     selTime,
    endTime:  addMin(selTime, 30),
    startISO: toISO(selDate, selTime),
    endISO:   toISO(selDate, addMin(selTime, 30)),
    // ホストはGAS側で優先順位付きで自動決定
  };

  document.getElementById('stepsBar').style.display='none';
  show('stepLoading');

  try {
    const res  = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) });
    const json = await res.json();

    // 全員埋まっているエラー
    if (!json.success && json.error === 'FULLY_BOOKED') {
      document.getElementById('stepsBar').style.display='flex';
      show('step2');
      setStep(2);
      // 満席メッセージを表示
      const msg = document.createElement('div');
      msg.style.cssText = 'background:#fff0f0;border:1.5px solid #ffaaaa;border-radius:10px;padding:14px 16px;font-size:13px;color:#cc0000;margin-bottom:16px;';
      msg.innerHTML = '⚠️ ご指定の時間帯は全員が予約済みです。<br>別の時間をお選びください。';
      const grid = document.getElementById('timeGrid');
      grid.parentNode.insertBefore(msg, grid);
      setTimeout(()=>msg.remove(), 8000);
      return;
    }

    document.getElementById('doneDetail').innerHTML =
      `📅 日時：<b>${payload.date} ${payload.time}〜${payload.endTime}</b><br>`+
      `👤 お名前：<b>${name}</b><br>`+
      `📧 メール：<b>${email}</b><br>`+
      `🧑‍💼 担当：<b>AI UNIT無料相談会担当者</b><br>`+
      `🔗 Google Meet：<b><a href="${json.meetUrl||json.zoomLink||'#'}" style="color:#0066ff">${(json.meetUrl||json.zoomLink) ? 'リンクを開く' : 'メールで送付済み'}</a></b>`;

    show('stepDone');

  } catch(err) {
    // GAS未設定時のデモ表示
    document.getElementById('doneDetail').innerHTML =
      `📅 日時：<b>${payload.date} ${payload.time}〜${payload.endTime}</b><br>`+
      `👤 お名前：<b>${name}</b><br>`+
      `📧 メール：<b>${email}</b><br>`+
      `🧑‍💼 担当：<b>GAS設定後に自動アサインされます</b><br>`+
      `🔗 Google Meet：<b>GAS設定後に自動送付されます</b>`;
    show('stepDone');
  }
}

function toISO(date, timeStr){
  const [h,m] = timeStr.split(':').map(Number);
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), h, m, 0);
  return d.toISOString();
}

// ---- Nav helpers ----
function goStep1(){ show('step1'); setStep(1); }
function goStep2b(){ show('step2'); setStep(2); }
function show(id){ ['step1','step2','step3','stepLoading','stepDone'].forEach(s=>document.getElementById(s).style.display=s===id?'block':'none'); }
function setStep(n){ [1,2,3].forEach(i=>{ const e=document.getElementById('si'+i); e.className='step'+(i===n?' active':i<n?' done':''); }); }

renderCal();
</script>
</body>
</html>
